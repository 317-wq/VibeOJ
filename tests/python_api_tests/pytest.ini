[pytest]
# pytest 配置文件
minversion = 7.0

# 测试发现
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 命令行默认参数
addopts =
    -v
    --tb=short
    --strict-markers
    --timeout=30

# 标记定义
markers =
    smoke: 冒烟测试 — 关键路径快速验证
    auth: 认证相关测试 (register/login/refresh/logout)
    problems: 题目 API 测试
    submissions: 提交与判题 API 测试
    admin: 管理后台 API 测试 (需要 admin token)
    slow: 耗时较长的测试

# 超时设置
timeout = 30
timeout_method = signal
