<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeOJ — 在线判题系统</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 800px;
      margin: 80px auto;
      padding: 20px;
      background: #f5f5f5;
      color: #333;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 40px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { color: #1890ff; margin-top: 0; }
    .status { color: #52c41a; font-weight: bold; }
    .api-list { list-style: none; padding: 0; }
    .api-list li {
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-family: monospace;
    }
    .method {
      display: inline-block;
      width: 50px;
      font-weight: bold;
      color: #1890ff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚡ VibeOJ</h1>
    <p>在线判题系统 — 后端服务运行中 <span class="status">●</span></p>
    <p>API 端点：</p>
    <ul class="api-list">
      <li><span class="method">GET</span> /api/v1/health</li>
      <li><span class="method">POST</span> /api/v1/auth/register</li>
      <li><span class="method">POST</span> /api/v1/auth/login</li>
      <li><span class="method">POST</span> /api/v1/auth/refresh</li>
      <li><span class="method">POST</span> /api/v1/auth/logout</li>
      <li><span class="method">GET</span> /api/v1/problems</li>
      <li><span class="method">POST</span> /api/v1/submissions</li>
      <li><span class="method">POST</span> /api/v1/admin/problems</li>
    </ul>
    <p style="color: #999; font-size: 14px; margin-top: 30px;">
      Phase 2 开发中 — API 逐步上线
    </p>
  </div>
</body>
</html>
